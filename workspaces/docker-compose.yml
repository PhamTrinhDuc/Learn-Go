services:
 redis:
  image: redis:7.2-alpine
  #  container_name: redis
  #  restart: always
  ports:
      - "6379:6379"
  command: redis-server --appendonly yes
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
  volumes:
    - redis_data:/data

volumes:
 redis_data:
   driver: local